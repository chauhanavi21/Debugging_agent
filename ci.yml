name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── SDK tests ──────────────────────────────────────────────────────────────
  sdk:
    name: SDK (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK
        run: |
          cd sdk
          pip install -e ".[dev]"

      - name: Run SDK tests
        run: |
          cd sdk
          python test_sdk.py

  # ── Server tests ───────────────────────────────────────────────────────────
  server:
    name: Server (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server deps
        run: |
          cd server
          pip install fastapi uvicorn[standard] sqlalchemy[asyncio] asyncpg pydantic aiosqlite

      - name: Run server tests
        run: |
          cd server
          python test_server.py

  # ── UI type check + build ──────────────────────────────────────────────────
  ui:
    name: UI (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: TypeScript type check
        run: cd ui && npx tsc --noEmit

      - name: Build
        run: cd ui && npm run build

  # ── Publish SDK to PyPI (only on version tags) ─────────────────────────────
  publish-sdk:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    needs: [sdk, server, ui]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build SDK package
        run: |
          pip install build
          cd sdk
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
          # Uses OIDC trusted publishing — no token needed
