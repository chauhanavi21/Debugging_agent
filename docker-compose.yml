version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentlens
      POSTGRES_PASSWORD: agentlens
      POSTGRES_DB: agentlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── AgentLens Server ────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "7430:7430"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentlens:agentlens@postgres:5432/agentlens
      AGENTLENS_API_KEY: ""          # set to a secret in prod
      CORS_ORIGINS: "http://localhost:5173,http://localhost:7430"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── UI (Vite dev server in dev, nginx in prod) ──────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:7430"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
